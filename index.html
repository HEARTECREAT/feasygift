<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        body { background-color: #0f0f12; color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .case-card { background: #1c1c1e; border: 1px solid #2c2c2e; transition: 0.2s; cursor: pointer; }
        .case-card:active { transform: scale(0.95); }
        
        /* Стили рулетки */
        #roulette-overlay { display: none; background: rgba(0,0,0,0.9); z-index: 100; }
        .roulette-container { 
            width: 100%; height: 120px; position: relative; overflow: hidden;
            border-top: 2px solid #3b82f6; border-bottom: 2px solid #3b82f6;
            background: #111;
        }
        .roulette-track { display: flex; transition: transform 3s cubic-bezier(0.15, 0, 0.15, 1); }
        .roulette-item { min-width: 100px; height: 120px; display: flex; align-items: center; justify-content: center; font-size: 40px; border-right: 1px solid #222; }
        .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #ef4444; z-index: 10; transform: translateX(-50%); }

        @keyframes win-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); box-shadow: 0 0 30px #3b82f6; }
            100% { transform: scale(1); }
        }
        .win-anim { animation: win-pulse 1s ease-in-out infinite; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Header -->
    <header class="p-4 flex justify-between items-center bg-[#1c1c1e]">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-blue-600 rounded-full flex items-center justify-center font-bold">A</div>
            <div>
                <p class="text-xs font-medium">Agaphone</p>
                <p class="text-[10px] text-green-400 font-bold">23 звезды заработано</p>
            </div>
        </div>
        <div class="bg-[#2c2c2e] px-3 py-1 rounded-full flex items-center gap-2">
            <i class="fas fa-star text-yellow-400"></i>
            <span class="font-bold text-sm">6</span>
        </div>
    </header>

    <!-- Main Grid -->
    <main class="p-4 grid grid-cols-2 gap-3">
        <div class="case-card rounded-2xl p-4 text-center" onclick="openCase('Turtle Case')">
            <div class="text-5xl mb-2">🐢</div>
            <p class="text-[10px] text-gray-400">Turtle Capsule</p>
            <p class="text-xs font-bold">⭐ 7</p>
        </div>
        <div class="case-card rounded-2xl p-4 text-center" onclick="openCase('Vase Case')">
            <div class="text-5xl mb-2">🏺</div>
            <p class="text-[10px] text-gray-400">Vase Capsule</p>
            <p class="text-xs font-bold">⭐ 7</p>
        </div>
        <div class="case-card rounded-2xl p-4 text-center" onclick="openCase('Promo Case')">
            <div class="text-5xl mb-2">🎁</div>
            <p class="text-[10px] text-gray-400">Promo Case</p>
            <p class="text-xs font-bold">⭐ 0</p>
        </div>
        <div class="case-card rounded-2xl p-4 text-center" onclick="openCase('Star Case')">
            <div class="text-5xl mb-2">💰</div>
            <p class="text-[10px] text-gray-400">Star Case</p>
            <p class="text-xs font-bold">⭐ 1</p>
        </div>
    </main>

    <!-- Roulette Overlay -->
    <div id="roulette-overlay" class="fixed inset-0 flex flex-col items-center justify-center p-6">
        <h2 id="status-text" class="text-xl font-black mb-8 italic uppercase text-blue-400">Открываем кейс...</h2>
        
        <div class="roulette-container mb-8">
            <div class="center-line"></div>
            <div id="track" class="roulette-track"></div>
        </div>

        <div id="win-card" class="hidden bg-[#1c1c1e] p-8 rounded-3xl text-center border-2 border-blue-500 win-anim">
            <p class="text-gray-400 text-sm mb-2 uppercase font-bold">Выпал предмет!</p>
            <div id="win-icon" class="text-7xl mb-4"></div>
            <button onclick="closeModal()" class="bg-blue-600 px-8 py-2 rounded-xl font-bold uppercase text-sm">Забрать</button>
        </div>
    </div>

    <script>
        const items = ['🐢', '🏺', '🎁', '💰', '💎', '🔥', '⚡', '🍀', '🍕', '👑'];
        const track = document.getElementById('track');
        const overlay = document.getElementById('roulette-overlay');
        const winCard = document.getElementById('win-card');
        const winIcon = document.getElementById('win-icon');
        const statusText = document.getElementById('status-text');

        function openCase(name) {
            // Очистка и подготовка
            track.innerHTML = '';
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';
            overlay.style.display = 'flex';
            winCard.classList.add('hidden');
            statusText.innerText = `Открываем ${name}...`;

            // Генерируем 50 предметов для прокрутки
            for(let i=0; i<60; i++) {
                const item = items[Math.floor(Math.random() * items.length)];
                const div = document.createElement('div');
                div.className = 'roulette-item';
                div.innerText = item;
                track.appendChild(div);
            }

            // Запуск анимации (чуть ждем чтобы браузер применил стили)
            setTimeout(() => {
                const itemWidth = 100;
                const winIndex = 45; // Какой по счету предмет выиграет
                const stopPos = (winIndex * itemWidth) - (window.innerWidth / 2) + (itemWidth / 2);
                
                track.style.transition = 'transform 3s cubic-bezier(0.15, 0, 0.15, 1)';
                track.style.transform = `translateX(-${stopPos}px)`;

                // Показ результата
                setTimeout(() => {
                    const wonItem = track.children[winIndex].innerText;
                    statusText.innerText = "Поздравляем!";
                    winIcon.innerText = wonItem;
                    winCard.classList.remove('hidden');
                }, 3100);
            }, 50);
        }

        function closeModal() {
            overlay.style.display = 'none';
        }
    </script>
</body>
</html>
